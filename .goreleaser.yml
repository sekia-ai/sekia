version: 2

builds:
  - id: sekiad
    main: ./cmd/sekiad
    binary: sekiad
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: sekiactl
    main: ./cmd/sekiactl
    binary: sekiactl
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: sekia-github
    main: ./cmd/sekia-github
    binary: sekia-github
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: sekia-slack
    main: ./cmd/sekia-slack
    binary: sekia-slack
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: sekia-linear
    main: ./cmd/sekia-linear
    binary: sekia-linear
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: sekia-google
    main: ./cmd/sekia-google
    binary: sekia-google
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: sekia-mcp
    main: ./cmd/sekia-mcp
    binary: sekia-mcp
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: sekia
    builds: [sekiad, sekiactl]
    name_template: "sekia_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: sekia-github
    builds: [sekia-github]
    name_template: "sekia-github_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: sekia-slack
    builds: [sekia-slack]
    name_template: "sekia-slack_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: sekia-linear
    builds: [sekia-linear]
    name_template: "sekia-linear_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: sekia-google
    builds: [sekia-google]
    name_template: "sekia-google_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: sekia-mcp
    builds: [sekia-mcp]
    name_template: "sekia-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: sekia
    ids: [sekia]
    repository:
      owner: sekia-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sekia-ai/sekia"
    description: "Multi-agent event bus - daemon and CLI"
    license: "Apache-2.0"
    install: |
      bin.install "sekiad"
      bin.install "sekiactl"
    service: |
      run [opt_bin/"sekiad"]
      keep_alive true
      log_path var/"log/sekiad.log"
      error_log_path var/"log/sekiad.log"
    test: |
      system bin/"sekiad", "--help"
      system bin/"sekiactl", "--help"

  - name: sekia-github
    ids: [sekia-github]
    repository:
      owner: sekia-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
